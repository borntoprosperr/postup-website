<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — PostUp</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#FF4500">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23FF4500'/><text x='16' y='22' font-family='Arial Black' font-weight='900' font-size='14' text-anchor='middle' fill='white'>P↑</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--or:#FF4500;--dk:#07070A;--wh:#F8F8F0}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--dk);color:var(--wh);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden;position:relative}

/* animated orange orbs — matches hero atmosphere */
.orb{position:absolute;border-radius:50%;filter:blur(110px);pointer-events:none}
.orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(255,69,0,.14),transparent 65%);top:-180px;left:50%;transform:translateX(-50%);animation:orbf 10s ease-in-out infinite}
.orb2{width:420px;height:420px;background:radial-gradient(circle,rgba(255,106,0,.09),transparent 65%);bottom:-100px;right:-80px;animation:orbf 13s ease-in-out infinite 3s}
@keyframes orbf{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.08) translateY(-25px)}}
.orb2{animation-name:orbf2}
@keyframes orbf2{0%,100%{transform:scale(1)}50%{transform:scale(1.12) translateY(-20px)}}

.content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:64px;text-decoration:none;opacity:0;animation:fu .6s cubic-bezier(.16,1,.3,1) .1s forwards}
.logo-mark{width:36px;height:36px;background:var(--or);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--wh);letter-spacing:-.3px}
.logo-text b{color:var(--or)}

@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.num{font-family:'Syne',sans-serif;font-size:clamp(90px,20vw,180px);font-weight:800;letter-spacing:-8px;line-height:1;margin-bottom:18px;position:relative;opacity:0;animation:fu .7s cubic-bezier(.16,1,.3,1) .25s forwards}
.num span{color:var(--or)}
.num::after{content:'404';position:absolute;inset:0;color:var(--or);filter:blur(40px);opacity:.25;z-index:-1}

h1{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,34px);font-weight:800;letter-spacing:-1px;margin-bottom:12px;opacity:0;animation:fu .6s cubic-bezier(.16,1,.3,1) .4s forwards}
p{font-size:15px;color:rgba(248,248,240,.4);margin-bottom:36px;font-weight:300;max-width:360px;line-height:1.6;opacity:0;animation:fu .6s cubic-bezier(.16,1,.3,1) .5s forwards}

.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:100px;background:var(--or);color:#fff;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;transition:all .3s;box-shadow:0 4px 24px rgba(255,69,0,.25);opacity:0;animation:fu .6s cubic-bezier(.16,1,.3,1) .6s forwards}
.btn:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(255,69,0,.4)}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="content">
  <a href="/" class="logo">
    <div class="logo-mark">P↑</div>
    <span class="logo-text">Post<b>Up</b></span>
  </a>
  <div class="num">4<span>0</span>4</div>
  <h1>Page not found</h1>
  <p>That page doesn't exist or moved. Let's get you back to creating.</p>
  <a href="/" class="btn">Back to PostUp →</a>
</div>
</body>
</html>
